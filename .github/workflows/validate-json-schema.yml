name: Validate JSON Schema

on:
  push:
    branches:
      - main
    paths:
      - 'src/data/**/*.json'
      - 'src/data/**/schema/*.json'
      - 'src/data/lgu/**'
      - 'scripts/validate-json-schema.js'
      - '.github/workflows/validate-json-schema.yml'
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
    paths:
      - 'src/data/**/*.json'
      - 'src/data/**/schema/*.json'
      - 'src/data/lgu/**'
      - 'scripts/validate-json-schema.js'
      - '.github/workflows/validate-json-schema.yml'

permissions:
  contents: read

jobs:
  validate-json-schema:
    name: Validate JSON files against schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate city barangays JSON file
        run: |
          node scripts/validate-json-schema.js \
            src/data/lgu/schema/barangays.schema.json \
            src/data/lgu/barangays.json

      - name: Validate city officials JSON file
        run: |
          node scripts/validate-json-schema.js \
            src/data/lgu/schema/officials.schema.json \
            src/data/lgu/officials.json

      - name: Validate city departments JSON file
        run: |
          node scripts/validate-json-schema.js \
            src/data/lgu/schema/departments.schema.json \
            src/data/lgu/departments.json

      # - name: Validate services JSON file
      #   run: |
      #     node scripts/validate-json-schema.js \
      #       src/data/services/schema/services.schema.json \
      #       "src/data/services/*.json"
